<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Packages & Pricing | YoungMinds Agency</title>
<meta name="description" content="Explore YoungMinds Agency packages and pricing across web development, AI, video editing, social media, design, and content services.">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#050507;--bg2:#0f0f12;--border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);--text:#f5f5f7;--muted:#8b8b95;--accent:#ffd700;--font:'Geist',system-ui,sans-serif;--shadow:0 20px 60px rgba(0,0,0,.4)}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;font-family:var(--font);color:var(--text);background:radial-gradient(circle at top right,rgba(255,215,0,.08),transparent 24%),radial-gradient(circle at left 10%,rgba(255,255,255,.03),transparent 20%),var(--bg)}
a{text-decoration:none;color:inherit}
.topbar{position:sticky;top:0;z-index:40;background:rgba(5,5,7,.8);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.05)}
.topbar-inner{max-width:1180px;margin:0 auto;padding:14px 22px;display:flex;align-items:center;justify-content:space-between;gap:14px}
.brand{display:flex;align-items:center;gap:10px;font-weight:800}.brand img{width:34px;height:34px;border-radius:10px;display:block}.brand-text{background:linear-gradient(135deg,var(--accent),#ff6b6b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-links{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.nav-links a{padding:9px 14px;border-radius:999px;font-size:12px;font-weight:700;color:var(--muted);border:1px solid transparent}
.nav-links a:hover,.nav-links a.active{color:var(--text);border-color:rgba(255,215,0,.28);background:rgba(255,215,0,.07)}
.nav-cta{padding:10px 18px;border-radius:12px;background:linear-gradient(135deg,var(--accent),#ffea00);color:#000;font-size:13px;font-weight:800}
.shell{max-width:1180px;margin:0 auto;padding:34px 22px 90px}
.pp-hero{padding:18px 0 14px}.pp-eyebrow{display:inline-flex;align-items:center;padding:7px 12px;border-radius:999px;background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.22);font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--accent)}
.pp-title{font-size:clamp(2.2rem,5vw,4.8rem);line-height:.95;letter-spacing:-.06em;margin:18px 0 14px;max-width:12ch}
.pp-copy{max-width:60ch;font-size:15px;line-height:1.8;color:var(--muted)}
.pp-filters{display:flex;flex-wrap:wrap;gap:10px;margin-top:24px}
.filter-chip{display:inline-flex;align-items:center;padding:10px 14px;border-radius:999px;border:1px solid var(--border2);background:rgba(255,255,255,.02);font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.filter-chip.active,.filter-chip:hover{color:var(--text);border-color:rgba(255,215,0,.34);background:rgba(255,215,0,.08)}
.pp-service{margin-top:34px}
.pp-service-head{display:flex;align-items:flex-end;justify-content:space-between;gap:18px;flex-wrap:wrap;margin-bottom:18px}
.pp-service-title{font-size:clamp(1.8rem,3vw,2.6rem);letter-spacing:-.05em;margin:10px 0 0}
.pp-service-copy{max-width:48ch;font-size:14px;line-height:1.8;color:var(--muted)}
.pp-sector{margin-top:16px;padding:22px;border-radius:24px;border:1px solid var(--border2);background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.015));box-shadow:var(--shadow)}
.pp-sector-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:16px}
.pp-sector-title{font-size:1.35rem;font-weight:800;letter-spacing:-.03em}
.pp-sector-copy{max-width:54ch;font-size:13px;line-height:1.8;color:var(--muted)}
.pp-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}
.pp-card{display:flex;flex-direction:column;gap:14px;padding:20px;border-radius:22px;border:1px solid var(--border2);background:var(--bg2)}
.pp-card.featured{border-color:rgba(255,215,0,.34);box-shadow:0 16px 40px rgba(0,0,0,.24)}
.pp-card-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
.pp-card-name{font-size:13px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--accent)}
.pp-card-price{font-size:2rem;font-weight:900;letter-spacing:-.06em;margin-top:8px}
.pp-card-usd{font-size:12px;font-weight:800;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
.pp-meta{display:flex;gap:8px;flex-wrap:wrap}
.pp-chip{display:inline-flex;align-items:center;padding:6px 10px;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,.03);font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.pp-chip.popular{border-color:rgba(255,215,0,.28);color:var(--accent)}
.pp-features{display:grid;gap:10px}
.pp-feature{display:flex;gap:10px;align-items:flex-start;font-size:13px;line-height:1.7;color:var(--text)}
.pp-feature::before{content:"✓";color:var(--accent);font-weight:900}
.pp-empty{padding:48px 20px;border:1px solid var(--border2);border-radius:22px;background:rgba(255,255,255,.02);text-align:center}
.pp-empty-title{font-size:22px;font-weight:800;letter-spacing:-.04em}
.pp-empty-copy{font-size:14px;line-height:1.7;color:var(--muted);margin-top:10px}
.pp-retry{margin-top:16px;padding:12px 18px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--accent),#ffea00);color:#000;font-weight:800;cursor:pointer}
@media (max-width:980px){.pp-grid{grid-template-columns:1fr}.pp-service-head,.pp-sector-head{align-items:flex-start}}
@media (max-width:700px){.topbar-inner,.shell{padding-left:16px;padding-right:16px}.nav-links{display:none}.pp-card,.pp-sector{padding:18px}.pp-title{max-width:none}}
</style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="/"><img src="/assets/logo-ym.jpg" alt="YoungMinds"><span class="brand-text">YoungMinds</span></a>
      <div class="nav-links">
        <a href="/#services">Services</a>
        <a class="active" href="/packages-pricing/">Packages & Pricing</a>
        <a href="/#process">Process</a>
        <a href="/#forms">Join / Hire</a>
      </div>
      <a class="nav-cta" href="/#forms">Hire us</a>
    </div>
  </div>
  <main class="shell">
    <div id="packages-root"></div>
  </main>
  <script src="/assets/packages-pricing.js"></script>
</body>
</html>
