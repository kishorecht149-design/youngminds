<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YoungMinds Member Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#050507;--bg2:#0f0f12;--panel:#141416;--panel2:#1c1c20;--text:#f5f5f7;--muted:#9a9aa3;--soft:#696970;--line:rgba(255,255,255,.1);--accent:#ffd700;--accentSoft:rgba(255,215,0,.12);--radius:24px;--font:'Geist',system-ui,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;scroll-padding-top:88px}
body{min-height:100vh;background:radial-gradient(circle at 80% -10%,rgba(255,215,0,.18),transparent 34%),radial-gradient(circle at 0 20%,rgba(255,255,255,.055),transparent 26%),var(--bg);color:var(--text);font-family:var(--font);-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{color:inherit;text-decoration:none}
.nav{position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;gap:18px;padding:18px clamp(18px,4vw,58px);background:rgba(5,5,7,.76);backdrop-filter:blur(22px);border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:center;gap:12px;font-weight:900;letter-spacing:-.04em}.brand-mark{width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,var(--accent),#fff1a8);color:#050507;display:grid;place-items:center;font-weight:900}.brand span{color:var(--accent)}
.nav-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap}.nav-link,.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:1px solid var(--line);border-radius:999px;padding:11px 16px;font-size:13px;font-weight:800;color:var(--muted);background:rgba(255,255,255,.03);transition:.22s ease}.nav-link:hover,.btn:hover{border-color:rgba(255,215,0,.46);color:var(--accent);transform:translateY(-1px)}.btn.primary{background:linear-gradient(135deg,var(--accent),#ffec70);color:#050507;border-color:transparent;box-shadow:0 14px 34px rgba(255,215,0,.22)}
.shell{width:min(1160px,calc(100% - 36px));margin:0 auto;padding:56px 0 34px}
.hero{display:grid;grid-template-columns:minmax(0,1.15fr) minmax(280px,.85fr);gap:28px;align-items:stretch;min-height:calc(100vh - 132px)}
.hero-copy,.photo-card,.panel{border:1px solid var(--line);border-radius:var(--radius);background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.016));box-shadow:0 30px 80px rgba(0,0,0,.34)}
.hero-copy{padding:clamp(28px,5vw,58px);display:flex;flex-direction:column;justify-content:center;position:relative;overflow:hidden}.hero-copy:after{content:"";position:absolute;right:-120px;bottom:-140px;width:360px;height:360px;background:radial-gradient(circle,rgba(255,215,0,.2),transparent 66%);filter:blur(18px)}
.eyebrow{position:relative;z-index:1;display:inline-flex;width:max-content;align-items:center;gap:8px;border:1px solid rgba(255,215,0,.42);border-radius:999px;background:var(--accentSoft);color:var(--accent);padding:8px 13px;font-size:11px;font-weight:900;letter-spacing:.14em;text-transform:uppercase;margin-bottom:28px}
h1{position:relative;z-index:1;font-size:clamp(46px,8vw,104px);line-height:.9;letter-spacing:-.07em;font-weight:900;max-width:820px}h1 span{color:var(--accent)}
.role{position:relative;z-index:1;margin-top:22px;font-size:clamp(20px,3vw,34px);font-weight:800;letter-spacing:-.04em;color:rgba(255,255,255,.86)}
.bio{position:relative;z-index:1;margin-top:22px;max-width:680px;color:var(--muted);font-size:17px;line-height:1.82}
.hero-actions{position:relative;z-index:1;display:flex;gap:12px;flex-wrap:wrap;margin-top:34px}
.photo-card{padding:18px;display:flex;flex-direction:column;gap:16px}.photo{min-height:440px;border-radius:20px;overflow:hidden;background:linear-gradient(135deg,rgba(255,215,0,.16),rgba(255,255,255,.035));display:grid;place-items:center}.photo img{width:100%;height:100%;object-fit:cover;display:block}.initial{font-size:92px;font-weight:900;color:var(--accent)}
.powered{display:flex;justify-content:space-between;gap:10px;align-items:center;padding:16px;border-radius:18px;background:rgba(255,255,255,.035);border:1px solid var(--line);color:var(--muted);font-size:13px;font-weight:700}.powered strong{color:var(--accent)}
.section{padding:42px 0}.section-head{display:flex;justify-content:space-between;align-items:end;gap:20px;margin-bottom:18px}.kicker{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);font-weight:900}.title{font-size:clamp(28px,4vw,46px);font-weight:900;letter-spacing:-.05em;margin-top:8px}.section-copy{color:var(--muted);line-height:1.75;max-width:560px}
.grid{display:grid;gap:16px}.skills{grid-template-columns:repeat(4,minmax(0,1fr))}.projects{grid-template-columns:repeat(3,minmax(0,1fr))}.experience{grid-template-columns:repeat(2,minmax(0,1fr))}
.panel{padding:22px;transition:.25s ease}.panel:hover{border-color:rgba(255,215,0,.38);transform:translateY(-3px);background:linear-gradient(180deg,rgba(255,215,0,.07),rgba(255,255,255,.018))}
.skill{font-size:14px;font-weight:900;color:var(--accent);text-transform:uppercase;letter-spacing:.08em}.project-title,.exp-role{font-size:20px;font-weight:900;letter-spacing:-.04em}.project-copy,.exp-copy{margin-top:12px;color:var(--muted);line-height:1.7;font-size:14px}.tags{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}.tag{border:1px solid rgba(255,215,0,.22);background:var(--accentSoft);color:var(--accent);border-radius:999px;padding:6px 9px;font-size:11px;font-weight:800}.meta{margin-top:8px;color:var(--soft);font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.08em}
.contact-card{display:grid;grid-template-columns:1.2fr .8fr;gap:18px;align-items:center;padding:28px;border:1px solid var(--line);border-radius:var(--radius);background:linear-gradient(135deg,rgba(255,215,0,.1),rgba(255,255,255,.02))}
.socials{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}.empty{padding:32px;border:1px dashed var(--line);border-radius:var(--radius);color:var(--muted);text-align:center}.footer{padding:34px 0 46px;color:var(--soft);font-size:13px;display:flex;justify-content:space-between;gap:18px;border-top:1px solid var(--line)}
.loading{min-height:70vh;display:grid;place-items:center;text-align:center;color:var(--muted)}.loading strong{display:block;color:var(--text);font-size:24px;margin-bottom:8px}
@media (max-width:900px){.hero,.contact-card{grid-template-columns:1fr}.photo{min-height:360px}.skills{grid-template-columns:repeat(2,1fr)}.projects,.experience{grid-template-columns:1fr}.socials{justify-content:flex-start}}
@media (max-width:560px){.nav{align-items:flex-start;flex-direction:column}.shell{width:min(100% - 28px,1160px);padding-top:28px}.hero{min-height:auto}.hero-copy{padding:28px}.photo{min-height:300px}.skills{grid-template-columns:1fr}.section-head{display:block}.footer{display:block;line-height:1.9}.btn,.nav-link{width:100%}.nav-actions{width:100%}}
</style>
</head>
<body>
<nav class="nav">
  <a class="brand" href="/"><span class="brand-mark">Y</span> Young<span>Minds</span></a>
  <div class="nav-actions">
    <a class="nav-link" href="/">Public Website</a>
    <a class="nav-link" href="#projects">Projects</a>
    <a class="nav-link" href="#contact">Contact</a>
  </div>
</nav>
<main class="shell" id="app"><div class="loading"><div><strong>Loading portfolio</strong>Powered by Young Minds</div></div></main>
<script>
const API = 'https://youngminds-3rk5.onrender.com';
const PUBLIC_ORIGIN = window.location.origin;
const escapeHtml = value => String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
const cleanUrl = value => String(value || '').trim();
function memberSlug(){
  const params = new URLSearchParams(window.location.search);
  const fromQuery = params.get('member') || params.get('slug');
  if(fromQuery) return fromQuery;
  const parts = window.location.pathname.split('/').filter(Boolean);
  return parts[0] === 'members' ? (parts[1] || '') : '';
}
function linkUrl(url){
  const clean = cleanUrl(url);
  if(!clean) return '';
  if(clean.includes('@') && !/^https?:|^mailto:/i.test(clean)) return `mailto:${clean}`;
  if(/^mailto:|^https?:/i.test(clean)) return clean;
  return `https://${clean}`;
}
function socialLabel(key){return ({website:'Website',linkedin:'LinkedIn',github:'GitHub',instagram:'Instagram',x:'X',email:'Email'})[key] || key;}
function render(member){
  const name = member.name || 'YoungMinds Member';
  const role = member.designation || 'YoungMinds Member';
  const initial = escapeHtml(name.trim().charAt(0).toUpperCase() || 'Y');
  const skills = Array.isArray(member.skills) ? member.skills : [];
  const projects = Array.isArray(member.projects) ? member.projects : [];
  const exp = Array.isArray(member.experienceItems) ? member.experienceItems : [];
  const socials = Object.entries(member.socialLinks || {}).filter(([,v]) => cleanUrl(v));
  const contact = member.contactEmail || member.socialLinks?.email || '';
  document.title = `${name} | YoungMinds Portfolio`;
  document.getElementById('app').innerHTML = `
    <section class="hero">
      <div class="hero-copy">
        <div class="eyebrow">Powered by Young Minds</div>
        <h1>${escapeHtml(name)}<br><span>Portfolio.</span></h1>
        <div class="role">${escapeHtml(role)}</div>
        ${member.bio ? `<p class="bio">${escapeHtml(member.bio)}</p>` : `<p class="bio">A curated YoungMinds portfolio highlighting skills, work, and professional experience.</p>`}
        <div class="hero-actions">
          ${linkUrl(member.ctaUrl || contact) ? `<a class="btn primary" href="${escapeHtml(linkUrl(member.ctaUrl || contact))}" target="_blank" rel="noopener">${escapeHtml(member.ctaLabel || 'Contact Me')}</a>` : ''}
          <a class="btn" href="#projects">View Projects</a>
        </div>
      </div>
      <aside class="photo-card">
        <div class="photo">${member.photo ? `<img src="${escapeHtml(member.photo)}" alt="${escapeHtml(name)}" onerror="this.remove();document.querySelector('.photo').innerHTML='<div class=&quot;initial&quot;>${initial}</div>'">` : `<div class="initial">${initial}</div>`}</div>
        <div class="powered"><span>Official member portfolio</span><strong>Young Minds</strong></div>
      </aside>
    </section>
    <section class="section" id="about"><div class="section-head"><div><div class="kicker">About</div><h2 class="title">Startup-ready profile</h2></div><p class="section-copy">${escapeHtml(member.bio || 'This profile is curated by the YoungMinds admin team.')}</p></div></section>
    <section class="section" id="skills"><div class="section-head"><div><div class="kicker">Skills</div><h2 class="title">Core strengths</h2></div></div>${skills.length ? `<div class="grid skills">${skills.map(skill => `<div class="panel"><div class="skill">${escapeHtml(skill)}</div></div>`).join('')}</div>` : `<div class="empty">Skills will be updated soon.</div>`}</section>
    <section class="section" id="projects"><div class="section-head"><div><div class="kicker">Projects</div><h2 class="title">Selected work</h2></div></div>${projects.length ? `<div class="grid projects">${projects.map(project => `<article class="panel"><div class="project-title">${escapeHtml(project.title || 'Project')}</div>${project.description ? `<p class="project-copy">${escapeHtml(project.description)}</p>` : ''}${project.link ? `<div class="tags"><a class="tag" href="${escapeHtml(linkUrl(project.link))}" target="_blank" rel="noopener">Open project</a></div>` : ''}${Array.isArray(project.tags) && project.tags.length ? `<div class="tags">${project.tags.map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join('')}</div>` : ''}</article>`).join('')}</div>` : `<div class="empty">Projects will be added soon.</div>`}</section>
    <section class="section" id="experience"><div class="section-head"><div><div class="kicker">Experience</div><h2 class="title">Professional path</h2></div></div>${exp.length ? `<div class="grid experience">${exp.map(item => `<article class="panel"><div class="exp-role">${escapeHtml(item.role || 'Experience')}</div><div class="meta">${escapeHtml([item.company,item.period].filter(Boolean).join(' · '))}</div>${item.description ? `<p class="exp-copy">${escapeHtml(item.description)}</p>` : ''}</article>`).join('')}</div>` : `<div class="empty">Experience details will be added soon.</div>`}</section>
    <section class="section" id="contact"><div class="contact-card"><div><div class="kicker">Contact</div><h2 class="title">Ready to connect?</h2><p class="section-copy">Reach out through the curated links below. Every portfolio follows the official YoungMinds identity.</p></div><div class="socials">${socials.map(([key,value]) => `<a class="btn" href="${escapeHtml(linkUrl(value))}" target="_blank" rel="noopener">${escapeHtml(socialLabel(key))}</a>`).join('') || (contact ? `<a class="btn primary" href="mailto:${escapeHtml(contact)}">Email</a>` : `<span class="section-copy">Contact links will be added soon.</span>`)}</div></div></section>
    <footer class="footer"><div>© ${new Date().getFullYear()} ${escapeHtml(name)}</div><div>Powered by Young Minds</div></footer>
  `;
}
async function boot(){
  const slug = memberSlug();
  if(!slug){
    document.getElementById('app').innerHTML = '<div class="loading"><div><strong>Member not selected</strong>Open a portfolio from the YoungMinds board.</div></div>';
    return;
  }
  try{
    const response = await fetch(`${API}/api/board-members/${encodeURIComponent(slug)}`, { cache:'no-store' });
    const data = await response.json().catch(() => ({}));
    if(!response.ok) throw new Error(data.error || 'Portfolio not found');
    render(data);
  }catch(err){
    document.getElementById('app').innerHTML = `<div class="loading"><div><strong>Portfolio unavailable</strong>${escapeHtml(err.message || 'Try again shortly.')}</div></div>`;
  }
}
boot();
</script>
</body>
</html>
