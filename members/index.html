<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>YoungMinds Member Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script>
(() => {
  try {
    const saved = localStorage.getItem("ym-theme");
    const light = window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches;
    document.documentElement.dataset.theme = saved || (light ? "light" : "dark");
  } catch (err) {
    document.documentElement.dataset.theme = "dark";
  }
})();
</script>
<style>
:root{--bg:#050507;--panel:#101012;--panel2:#16161a;--text:#f7f7f4;--muted:#a2a2aa;--soft:#72727a;--line:rgba(255,255,255,.1);--accent:#ffd700;--accent-soft:rgba(255,215,0,.12);--radius:24px;--font:'Geist',system-ui,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;scroll-padding-top:84px}
body{min-height:100vh;background:radial-gradient(circle at 80% -10%,rgba(255,215,0,.12),transparent 34%),linear-gradient(180deg,#080809 0%,#050507 48%,#020203 100%);color:var(--text);font-family:var(--font);-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{color:inherit;text-decoration:none}
.topbar{position:sticky;top:0;z-index:30;border-bottom:1px solid var(--line);background:rgba(5,5,7,.84);backdrop-filter:blur(20px)}
.nav{width:min(1120px,calc(100% - 32px));margin:0 auto;min-height:72px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.brand{display:flex;align-items:center;gap:12px;font-weight:900;letter-spacing:-.04em}
.brand img{width:74px;height:auto;display:block}
.brand-name{font-size:17px}.brand-name span{color:var(--accent)}
.nav-links{display:flex;align-items:center;gap:8px}
.nav-link,.btn{display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.035);color:var(--muted);padding:10px 14px;font-size:13px;font-weight:750;transition:.2s ease}
.nav-link:hover,.btn:hover{color:var(--accent);border-color:rgba(255,215,0,.38)}
.btn.primary{background:linear-gradient(135deg,var(--accent),#ffec70);border-color:transparent;color:#050507}
.shell{width:min(1120px,calc(100% - 32px));margin:0 auto;padding:32px 0 40px}
.profile-card{position:relative;display:grid;grid-template-columns:390px minmax(0,1fr);gap:0;overflow:hidden;border:1px solid var(--line);border-radius:30px;background:linear-gradient(135deg,rgba(255,255,255,.045),rgba(255,255,255,.014));box-shadow:0 28px 80px rgba(0,0,0,.34);animation:fadeUp .65s cubic-bezier(.16,1,.3,1) both}
.profile-card:before{content:"";position:absolute;inset:-1px;pointer-events:none;background:radial-gradient(circle at 78% 22%,rgba(255,215,0,.18),transparent 32%),linear-gradient(120deg,transparent 0 44%,rgba(255,215,0,.075) 45%,transparent 58%);opacity:.78}
.portrait{min-height:520px;background:linear-gradient(135deg,rgba(255,215,0,.12),rgba(255,255,255,.025));position:relative;overflow:hidden;z-index:1}
.portrait img{width:100%;height:100%;object-fit:cover;display:block}
.portrait:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 55%,rgba(0,0,0,.42));pointer-events:none}
.portrait-fallback{position:absolute;inset:0;display:grid;place-items:center;font-size:84px;font-weight:900;color:var(--accent)}
.profile-copy{position:relative;z-index:1;padding:clamp(28px,5vw,56px);display:flex;flex-direction:column;justify-content:center}
.badge{display:inline-flex;width:max-content;max-width:100%;align-items:center;gap:8px;border:1px solid rgba(255,215,0,.35);border-radius:999px;background:var(--accent-soft);color:var(--accent);padding:7px 11px;font-size:10px;font-weight:900;letter-spacing:.14em;text-transform:uppercase;margin-bottom:22px}
h1{font-size:clamp(38px,6vw,72px);line-height:1;letter-spacing:-.065em;font-weight:900;max-width:720px}
.role{margin-top:16px;font-size:clamp(20px,2.6vw,30px);line-height:1.15;font-weight:800;letter-spacing:-.04em;color:rgba(255,255,255,.9)}
.bio{margin-top:20px;max-width:650px;color:var(--muted);font-size:16px;line-height:1.75}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:28px}
.section{padding:36px 0;animation:fadeUp .65s cubic-bezier(.16,1,.3,1) both;animation-delay:.08s}
.section:nth-of-type(3){animation-delay:.14s}.section:nth-of-type(4){animation-delay:.2s}.section:nth-of-type(5){animation-delay:.26s}.section:nth-of-type(6){animation-delay:.32s}
.section-head{display:flex;align-items:end;justify-content:space-between;gap:18px;margin-bottom:16px}
.kicker{font-size:10px;font-weight:900;letter-spacing:.18em;text-transform:uppercase;color:var(--accent)}
.title{margin-top:7px;font-size:clamp(26px,3.4vw,38px);line-height:1.05;font-weight:900;letter-spacing:-.055em}
.section-copy{color:var(--muted);font-size:15px;line-height:1.75;max-width:680px}
.grid{display:grid;gap:14px}.skills{grid-template-columns:repeat(4,minmax(0,1fr))}.projects{grid-template-columns:repeat(3,minmax(0,1fr))}.experience{grid-template-columns:repeat(2,minmax(0,1fr))}
.panel{border:1px solid var(--line);border-radius:22px;background:linear-gradient(180deg,rgba(255,255,255,.038),rgba(255,255,255,.014));padding:19px;transition:.2s ease}
.panel:hover{border-color:rgba(255,215,0,.32);transform:translateY(-2px)}
.skill{font-size:14px;font-weight:800;color:var(--text)}
.project-title,.exp-role{font-size:18px;font-weight:850;letter-spacing:-.035em}
.project-copy,.exp-copy{margin-top:10px;color:var(--muted);font-size:14px;line-height:1.7}
.project-card{display:flex;flex-direction:column;min-height:100%;overflow:hidden;padding:0;color:inherit}
.project-card:hover .project-thumb img{transform:scale(1.055)}
.project-thumb{height:150px;background:linear-gradient(135deg,rgba(255,215,0,.16),rgba(255,255,255,.04));overflow:hidden;border-bottom:1px solid var(--line);display:grid;place-items:center}
.project-thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .55s cubic-bezier(.16,1,.3,1)}
.project-thumb-empty span{font-size:44px;font-weight:900;color:rgba(255,215,0,.7)}
.project-body{padding:18px}
.project-open{display:inline-flex;margin-top:14px;color:var(--accent);font-size:12px;font-weight:900;letter-spacing:.08em;text-transform:uppercase}
.exp-card{position:relative;overflow:hidden}
.exp-card:before{content:"";position:absolute;inset:auto 18px 0 18px;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.45}
.meta{margin-top:7px;color:var(--soft);font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em}
.tags{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.tag{display:inline-flex;border:1px solid rgba(255,215,0,.22);border-radius:999px;background:var(--accent-soft);color:var(--accent);padding:6px 9px;font-size:11px;font-weight:800}
.empty{border:1px dashed var(--line);border-radius:22px;padding:22px;color:var(--muted);font-size:14px;text-align:center}
.contact-card{border:1px solid var(--line);border-radius:26px;background:linear-gradient(135deg,rgba(255,215,0,.075),rgba(255,255,255,.018));padding:24px;display:grid;grid-template-columns:minmax(0,1fr) auto;gap:18px;align-items:center}
.socials{display:flex;gap:9px;flex-wrap:wrap;justify-content:flex-end}
.footer{padding:28px 0 36px;border-top:1px solid var(--line);display:flex;justify-content:space-between;gap:16px;color:var(--soft);font-size:13px}
.loading{min-height:70vh;display:grid;place-items:center;text-align:center;color:var(--muted)}.loading strong{display:block;color:var(--text);font-size:22px;margin-bottom:8px}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@media (prefers-reduced-motion:reduce){html{scroll-behavior:auto}.profile-card,.section{animation:none}.panel,.project-thumb img{transition:none}.panel:hover{transform:none}}
@media (max-width:920px){.profile-card{grid-template-columns:1fr}.portrait{min-height:420px;order:1}.profile-copy{order:2}.skills{grid-template-columns:repeat(2,1fr)}.projects,.experience{grid-template-columns:1fr}.contact-card{grid-template-columns:1fr}.socials{justify-content:flex-start}}
@media (max-width:560px){
  html{scroll-padding-top:72px}
  .nav{width:min(100% - 24px,1120px);min-height:64px;padding:10px 0;align-items:center;flex-direction:row}
  .brand img{width:58px}.brand-name{display:none}
  .nav-links{width:auto;display:flex;gap:6px;margin-left:auto}
  .nav-link{padding:8px 9px;font-size:10px}
  .shell{width:min(100% - 24px,1120px);padding:18px 0 32px}
  .profile-card{border-radius:24px}
  .portrait{min-height:0;aspect-ratio:4/4.9;border-bottom:1px solid var(--line)}
  .profile-copy{position:relative;margin-top:-28px;padding:20px 20px 22px;border-top:1px solid var(--line);border-radius:22px 22px 0 0;background:linear-gradient(180deg,rgba(16,16,18,.96),rgba(16,16,18,.88))}
  .badge{font-size:9px;letter-spacing:.12em;margin-bottom:16px;white-space:normal}
  h1{font-size:clamp(32px,10vw,42px);line-height:1.03}
  .role{font-size:19px;margin-top:13px}
  .bio{font-size:14.5px;line-height:1.68;margin-top:16px}
  .actions{margin-top:22px}.btn{width:100%;padding:11px 13px;font-size:13px}
  .section{padding:28px 0}.section-head{display:block;margin-bottom:14px}
  .title{font-size:27px}.section-copy{font-size:14px}
  .skills{grid-template-columns:1fr}.panel{padding:16px;border-radius:18px}
  .contact-card{padding:20px;border-radius:22px}.socials .btn{width:100%}
  .footer{display:block;line-height:1.9}
}
</style>
<link rel="stylesheet" href="/assets/theme.css">
<script src="/assets/theme.js" defer></script>
</head>
<body>
<header class="topbar">
  <nav class="nav">
    <a class="brand" href="/"><img src="/assets/logo.png" alt="YoungMinds logo"><span class="brand-name">Young <span>Minds</span></span></a>
    <div class="nav-links">
      <a class="nav-link" href="/">Website</a>
      <a class="nav-link" href="#work">Work</a>
      <a class="nav-link" href="#contact">Contact</a>
    </div>
  </nav>
</header>
<main class="shell" id="app"><div class="loading"><div><strong>Loading portfolio</strong>Young Minds</div></div></main>
<script>
const API = 'https://youngminds-3rk5.onrender.com';
const escapeHtml = value => String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
const cleanUrl = value => String(value || '').trim();
function memberSlug(){
  const params = new URLSearchParams(window.location.search);
  const fromQuery = params.get('member') || params.get('slug');
  if(fromQuery) return fromQuery;
  const parts = window.location.pathname.split('/').filter(Boolean);
  return parts[0] === 'members' ? (parts[1] || '') : '';
}
function linkUrl(url){
  const clean = cleanUrl(url);
  if(!clean) return '';
  if(clean.includes('@') && !/^https?:|^mailto:/i.test(clean)) return `mailto:${clean}`;
  if(/^mailto:|^https?:/i.test(clean)) return clean;
  return `https://${clean}`;
}
function mediaUrl(url){
  const clean = cleanUrl(url);
  if(!clean) return '';
  if(/^data:image\//i.test(clean) || /^https?:\/\//i.test(clean) || clean.startsWith('/')) return clean;
  return `https://${clean}`;
}
function socialLabel(key){return ({website:'Website',linkedin:'LinkedIn',github:'GitHub',instagram:'Instagram',x:'X',email:'Email'})[key] || key;}
function renderProject(project){
  const title = project.title || 'Project';
  const initial = escapeHtml(String(title).trim().charAt(0).toUpperCase() || 'P');
  const thumbnail = mediaUrl(project.thumbnail || project.image || '');
  const tags = Array.isArray(project.tags) && project.tags.length ? `<div class="tags">${project.tags.map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join('')}</div>` : '';
  const inner = `
    ${thumbnail ? `<div class="project-thumb"><img src="${escapeHtml(thumbnail)}" alt="${escapeHtml(title)} thumbnail" loading="lazy"></div>` : `<div class="project-thumb project-thumb-empty"><span>${initial}</span></div>`}
    <div class="project-body">
      <div class="project-title">${escapeHtml(title)}</div>
      ${project.description ? `<p class="project-copy">${escapeHtml(project.description)}</p>` : ''}
      ${tags}
      ${project.link ? `<span class="project-open">Open project</span>` : ''}
    </div>
  `;
  if(project.link){
    return `<a class="panel project-card" href="${escapeHtml(linkUrl(project.link))}" target="_blank" rel="noopener">${inner}</a>`;
  }
  return `<article class="panel project-card">${inner}</article>`;
}
function render(member){
  const name = member.name || 'YoungMinds Member';
  const role = member.designation || 'YoungMinds Member';
  const initial = escapeHtml(name.trim().charAt(0).toUpperCase() || 'Y');
  const skills = Array.isArray(member.skills) ? member.skills : [];
  const projects = Array.isArray(member.projects) ? member.projects : [];
  const exp = Array.isArray(member.experienceItems) ? member.experienceItems : [];
  const socials = Object.entries(member.socialLinks || {}).filter(([,v]) => cleanUrl(v));
  const contact = member.contactEmail || member.socialLinks?.email || '';
  const contactUrl = linkUrl(member.ctaUrl || contact);
  const heroIntro = cleanUrl(member.heroIntro);
  document.title = `${name} | YoungMinds Portfolio`;
  document.getElementById('app').innerHTML = `
    <section class="profile-card">
      <figure class="portrait">
        ${member.photo ? `<img src="${escapeHtml(member.photo)}" alt="${escapeHtml(name)}" onerror="this.remove();document.querySelector('.portrait').insertAdjacentHTML('beforeend','<div class=&quot;portrait-fallback&quot;>${initial}</div>')">` : `<div class="portrait-fallback">${initial}</div>`}
      </figure>
      <div class="profile-copy">
        <div class="badge">YoungMinds Portfolio</div>
        <h1>${escapeHtml(name)}</h1>
        <div class="role">${escapeHtml(role)}</div>
        ${heroIntro ? `<p class="bio">${escapeHtml(heroIntro)}</p>` : ``}
        <div class="actions">
          ${contactUrl ? `<a class="btn primary" href="${escapeHtml(contactUrl)}" target="_blank" rel="noopener">${escapeHtml(member.ctaLabel || 'Contact')}</a>` : ''}
          <a class="btn" href="#work">View Work</a>
        </div>
      </div>
    </section>
    ${member.bio ? `<section class="section" id="about"><div class="section-head"><div><div class="kicker">About</div><h2 class="title">Profile</h2></div><p class="section-copy">${escapeHtml(member.bio)}</p></div></section>` : ``}
    <section class="section" id="skills"><div class="section-head"><div><div class="kicker">Skills</div><h2 class="title">Core strengths</h2></div></div>${skills.length ? `<div class="grid skills">${skills.map(skill => `<div class="panel"><div class="skill">${escapeHtml(skill)}</div></div>`).join('')}</div>` : `<div class="empty">Skills will be updated soon.</div>`}</section>
    <section class="section" id="work"><div class="section-head"><div><div class="kicker">Projects</div><h2 class="title">Selected work</h2></div></div>${projects.length ? `<div class="grid projects">${projects.map(renderProject).join('')}</div>` : `<div class="empty">Projects will be updated soon.</div>`}</section>
    <section class="section" id="experience"><div class="section-head"><div><div class="kicker">Experience</div><h2 class="title">Experience</h2></div></div>${exp.length ? `<div class="grid experience">${exp.map(item => `<article class="panel exp-card"><div class="exp-role">${escapeHtml(item.role || 'Experience')}</div><div class="meta">${escapeHtml([item.company,item.period].filter(Boolean).join(' - '))}</div>${item.description ? `<p class="exp-copy">${escapeHtml(item.description)}</p>` : ''}</article>`).join('')}</div>` : `<div class="empty">Experience will be updated soon.</div>`}</section>
    <section class="section" id="contact"><div class="contact-card"><div><div class="kicker">Contact</div><h2 class="title">Connect</h2><p class="section-copy">Use the links below to reach this YoungMinds member.</p></div><div class="socials">${socials.map(([key,value]) => `<a class="btn" href="${escapeHtml(linkUrl(value))}" target="_blank" rel="noopener">${escapeHtml(socialLabel(key))}</a>`).join('') || (contact ? `<a class="btn primary" href="mailto:${escapeHtml(contact)}">Email</a>` : `<span class="section-copy">Contact links will be updated soon.</span>`)}</div></div></section>
    <footer class="footer"><div>© ${new Date().getFullYear()} ${escapeHtml(name)}</div><div>Powered by Young Minds</div></footer>
  `;
}
async function boot(){
  const slug = memberSlug();
  if(!slug){
    document.getElementById('app').innerHTML = '<div class="loading"><div><strong>Member not selected</strong>Open a portfolio from the YoungMinds board.</div></div>';
    return;
  }
  try{
    const response = await fetch(`${API}/api/board-members/${encodeURIComponent(slug)}`, { cache:'no-store' });
    const data = await response.json().catch(() => ({}));
    if(!response.ok) throw new Error(data.error || 'Portfolio not found');
    render(data);
  }catch(err){
    document.getElementById('app').innerHTML = `<div class="loading"><div><strong>Portfolio unavailable</strong>${escapeHtml(err.message || 'Try again shortly.')}</div></div>`;
  }
}
boot();
</script>
</body>
</html>
