<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YoungMinds Admin</title>
<script>
(() => {
  try {
    const saved = localStorage.getItem("ym-theme");
    const light = window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches;
    document.documentElement.dataset.theme = saved || (light ? "light" : "dark");
  } catch (err) {
    document.documentElement.dataset.theme = "dark";
  }
})();
</script>
<style>
:root{--bg:#070808;--bg2:#111315;--border:rgba(255,255,255,.08);--text:#efefef;--muted:#8c8f95;--accent:#e8c547;--blue:#60a5fa;font-family:"DM Sans",system-ui,sans-serif}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;display:grid;place-items:center;background:
radial-gradient(circle at top,rgba(96,165,250,.08),transparent 32%),
linear-gradient(180deg,#050506,#0d0f10);color:var(--text);padding:24px}
.card{width:min(560px,100%);background:rgba(17,19,21,.92);border:1px solid var(--border);border-radius:20px;padding:28px;box-shadow:0 24px 80px rgba(0,0,0,.45)}
.eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:var(--blue);letter-spacing:.08em;text-transform:uppercase}
.dot{width:10px;height:10px;border-radius:50%;background:var(--blue);box-shadow:0 0 18px rgba(96,165,250,.45)}
h1{margin:16px 0 10px;font-size:32px;line-height:1.05;letter-spacing:-.04em}
p{margin:0 0 12px;color:var(--muted);line-height:1.7}
.status{margin-top:18px;padding:14px 16px;border-radius:14px;background:rgba(255,255,255,.03);border:1px solid var(--border);font-size:14px}
.actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:22px}
.btn{appearance:none;border:none;border-radius:999px;padding:12px 18px;font-size:14px;font-weight:700;cursor:pointer}
.btn-primary{background:var(--accent);color:#000}
.btn-ghost{background:transparent;color:var(--text);border:1px solid var(--border)}
</style>
<link rel="stylesheet" href="/assets/theme.css">
<script src="/assets/theme.js" defer></script>
</head>
<body>
  <div class="card">
    <div class="eyebrow"><span class="dot"></span> YoungMinds Admin</div>
    <h1>Opening admin panel…</h1>
    <p>We’re warming up the backend and will redirect you into admin as soon as it responds.</p>
    <div class="status" id="status">Checking backend status…</div>
    <div class="actions">
      <button class="btn btn-primary" type="button" onclick="goNow()">Open now</button>
      <button class="btn btn-ghost" type="button" onclick="window.location.href='/'">Back to site</button>
    </div>
  </div>
<script>
const BACKEND = 'https://youngminds-3rk5.onrender.com';
const TARGET = BACKEND + '/admin';
const statusEl = document.getElementById('status');

function goNow() {
  window.location.href = TARGET;
}

async function wakeAndRedirect() {
  for (let i = 0; i < 12; i += 1) {
    statusEl.textContent = i === 0
      ? 'Waking up the backend service…'
      : 'Still waking up the backend. Redirecting automatically when ready…';
    try {
      const res = await fetch(BACKEND + '/api/health', { cache: 'no-store' });
      if (res.ok) {
        statusEl.textContent = 'Backend is ready. Redirecting now…';
        setTimeout(goNow, 700);
        return;
      }
    } catch {}
    await new Promise(resolve => setTimeout(resolve, 5000));
  }
  statusEl.textContent = 'The backend is taking longer than usual. You can still open admin manually.';
}

wakeAndRedirect();
</script>
</body>
</html>
